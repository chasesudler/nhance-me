      <stop offset="0" stop-color="#1B4383"/>
      <stop offset="1" stop-color="#0F2D64"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#F47937"/>
      <stop offset="1" stop-color="#FF8B3D"/>
